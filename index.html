<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Delivery For You ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fdf6f6;
            --envelope-color: #f3d1d1;
            --envelope-dark: #e6b2b2;
            --letter-color: #ffffff;
            --text-color: #5a4a4a;
            --accent-color: #d4a373;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Canvas Backdrop for Fireworks */
        #fwCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .envelope-wrapper {
            position: relative;
            width: 320px;
            height: 220px;
            background-color: var(--envelope-dark);
            box-shadow: 0 15px 35px rgba(90, 74, 74, 0.15);
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10; /* Keep envelope above effects */
        }

        .envelope-wrapper:hover { 
            transform: scale(1.04); 
        }

        /* Envelope Flaps */
        .envelope-wrapper::before {
            content: ''; position: absolute; top: 0; left: 0; width: 0; height: 0;
            border-style: solid; border-width: 0 0 220px 320px;
            border-color: transparent transparent var(--envelope-color) transparent; z-index: 3;
        }

        .envelope-wrapper::after {
            content: ''; position: absolute; top: 0; right: 0; width: 0; height: 0;
            border-style: solid; border-width: 0 320px 220px 0;
            border-color: transparent var(--envelope-color) transparent transparent; z-index: 3;
        }

        .top-flap {
            position: absolute; top: 0; left: 0; width: 0; height: 0;
            border-style: solid; border-width: 120px 160px 0 160px;
            border-color: var(--envelope-dark) transparent transparent transparent;
            transform-origin: top; transition: transform 0.6s ease-in-out; z-index: 4;
        }

        .wax-seal {
            position: absolute; top: 105px; left: 142px; width: 36px; height: 36px;
            background: radial-gradient(circle, #b83232 40%, #8a1f1f 100%);
            border-radius: 50%; z-index: 5; box-shadow: 0 4px 8px rgba(0,0,0,0.25);
            display: flex; justify-content: center; align-items: center; color: #fff;
            font-size: 14px; transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .recipient-name {
            position: absolute; bottom: 25px; width: 100%; text-align: center;
            font-family: 'Great Vibes', cursive; font-size: 2.6rem; color: var(--text-color);
            z-index: 5; pointer-events: none; text-shadow: 1px 1px 3px rgba(255,255,255,0.7);
        }

        /* Letter Styling */
        .letter {
            position: absolute; bottom: 5px; left: 15px; width: 290px; height: 200px;
            background-color: var(--letter-color); border-radius: 6px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); z-index: 2;
            transition: transform 0.7s cubic-bezier(0.19, 1, 0.22, 1), height 0.7s ease;
            padding: 25px 20px; box-sizing: border-box; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center; opacity: 0;
        }

        .letter h1 { font-family: 'Great Vibes', cursive; font-size: 2.4rem; margin: 0 0 8px 0; color: #b83232; }
        .letter p { font-size: 0.85rem; color: var(--text-color); line-height: 1.5; margin: 0 0 18px 0; font-weight: 300; }

        .enter-btn {
            background-color: var(--accent-color); color: white; border: none;
            padding: 9px 20px; font-family: 'Montserrat', sans-serif; font-size: 0.75rem;
            letter-spacing: 1.5px; text-transform: uppercase; border-radius: 25px; cursor: pointer;
            box-shadow: 0 4px 10px rgba(212, 163, 115, 0.4); transition: all 0.3s ease;
            font-weight: 500;
        }
        .enter-btn:hover { background-color: #c39262; transform: translateY(-1px); }

        /* Animation Classes */
        .envelope-wrapper.open .top-flap { transform: rotateX(180deg); z-index: 1; }
        .envelope-wrapper.open .wax-seal { opacity: 0; transform: scale(0.5); pointer-events: none; }
        .envelope-wrapper.open .letter { transform: translateY(-130px); height: 250px; z-index: 4; opacity: 1; }

        /* --- Balloon Elements Styling --- */
        .balloon {
            position: absolute;
            bottom: -150px;
            width: 50px;
            height: 65px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            z-index: 2;
            animation: floatUp 6s linear forwards;
        }
        .balloon::after {
            content: "";
            position: absolute;
            bottom: -8px;
            left: 22px;
            width: 0; height: 0;
            border-left: 3px solid transparent;
            border-right: 3px solid transparent;
            border-bottom: 8px solid inherit;
        }
        .balloon-string {
            position: absolute;
            bottom: -40px;
            left: 24px;
            width: 1px;
            height: 40px;
            background-color: rgba(0, 0, 0, 0.2);
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-120vh) rotate(10deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <canvas id="fwCanvas"></canvas>

    <div class="envelope-wrapper" id="envelope" onclick="openEnvelope()">
        <div class="top-flap"></div>
        <div class="wax-seal">❤</div>
        <div class="recipient-name">For Birthday Girl ✨</div>
        
        <div class="letter">
            <h1>Happy Birthday!</h1>
            <p>Today is entirely yours. I made a digital getaway just to look back at our favorite moments.</p>
            <button class="enter-btn" onclick="enterSite(event)">Step Inside →</button>
        </div>
    </div>

    <script>
        let animationStarted = false;

        function openEnvelope() {
            const env = document.getElementById('envelope');
            if (env.classList.contains('open')) return;
            
            env.classList.add('open');
            
            // Kick off the visual animations
            if (!animationStarted) {
                animationStarted = true;
                startFireworks();
                startBalloons();
            }
        }

        function enterSite(event) {
            event.stopPropagation(); 
            window.location.href = "main.html"; 
        }

        /* --- 1. FIREWORKS ENGINE (Canvas) --- */
        const canvas = document.getElementById('fwCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.radius = Math.random() * 3 + 1;
                this.velocity = {
                    x: (Math.random() - 0.5) * 8,
                    y: (Math.random() - 0.5) * 8
                };
                this.alpha = 1;
                this.decay = Math.random() * 0.015 + 0.015;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
            update() {
                this.velocity.y += 0.05; // gravity simulation
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.alpha -= this.decay;
            }
        }

        function createFirework(x, y) {
            const colors = ['#ff4d6d', '#ff758f', '#ffb3c1', '#d4a373', '#2ec4b6', '#e0aaff'];
            const chosenColor = colors[Math.floor(Math.random() * colors.length)];
            for (let i = 0; i < 40; i++) {
                particles.push(new Particle(x, y, chosenColor));
            }
        }

        function animateFireworks() {
            requestAnimationFrame(animateFireworks);
            ctx.fillStyle = 'rgba(253, 246, 246, 0.2)'; // Fades tracks gently
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach((particle, index) => {
                if (particle.alpha <= 0) {
                    particles.splice(index, 1);
                } else {
                    particle.update();
                    particle.draw();
                }
            });
        }

        function startFireworks() {
            animateFireworks();
            // Automatically launch random screen-wide fireworks bursts
            setInterval(() => {
                const x = Math.random() * canvas.width;
                const y = Math.random() * (canvas.height * 0.6); // Explosions stay in top 60%
                createFirework(x, y);
            }, 800);
        }

        /* --- 2. BALLOONS GENERATOR (DOM Spawner) --- */
        function startBalloons() {
            const balloonColors = ['#ff758f', '#ffb3c1', '#c39262', '#2ec4b6', '#a2d2ff', '#bde0fe'];
            
            setInterval(() => {
                const balloon = document.createElement('div');
                balloon.className = 'balloon';
                
                // Set random positions & vibrant colors
                const randomColor = balloonColors[Math.floor(Math.random() * balloonColors.length)];
                balloon.style.backgroundColor = randomColor;
                balloon.style.left = Math.random() * 90 + 'vw';
                balloon.style.animationDuration = (Math.random() * 3 + 5) + 's'; // Between 5s and 8s
                
                // Create custom inverted border color for the tiny tie knot
                balloon.style.borderBottomColor = randomColor; 

                // Attach hanging balance string
                const string = document.createElement('div');
                string.className = 'balloon-string';
                balloon.appendChild(string);

                document.body.appendChild(balloon);

                // Housekeeping: Garbage collect off-screen elements
                setTimeout(() => {
                    balloon.remove();
                }, 8000);
            }, 600); // Launches a new balloon every 0.6 seconds
        }
    </script>
</body>
</html>
